<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion WiFi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; padding: 2rem; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo h1 { font-size: 22px; color: #1a1a2e; }
    .logo p { font-size: 13px; color: #888; margin-top: 4px; }
    label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; margin-bottom: 1rem; }
    input:focus { border-color: #4f46e5; }
    button { width: 100%; padding: 13px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 500; }
    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    .msg { margin-top: 1rem; padding: 10px 14px; border-radius: 8px; font-size: 13px; text-align: center; display: none; }
    .msg.error { background: #fef2f2; color: #dc2626; display: block; }
    .msg.success { background: #f0fdf4; color: #16a34a; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>WiFi Hotspot</h1>
      <p>Entre ton code pour acceder a internet</p>
    </div>
    <label>Code voucher</label>
    <input type="text" id="code" placeholder="ex: FREE1H" autocomplete="off" />
    <button id="btn" onclick="connect()">Se connecter</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    async function connect() {
      const code = document.getElementById('code').value.trim();
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');

      if (!code) {
        msg.className = 'msg error';
        msg.textContent = 'Entre un code voucher.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Connexion...';
      msg.className = 'msg';

      const mac = 'AA:BB:CC:DD:EE:FF';

      try {
        const res = await fetch('/api/validate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, mac })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          msg.className = 'msg success';
          msg.textContent = 'Connecte ! Tu as ' + data.duration_h + 'h d acces.';
          btn.textContent = 'Connecte';
        } else {
          msg.className = 'msg error';
          msg.textContent = data.error || 'Code invalide.';
          btn.disabled = false;
          btn.textContent = 'Se connecter';
        }
      } catch (e) {
        msg.className = 'msg error';
        msg.textContent = 'Erreur de connexion. Reessaie.';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    }

    document.getElementById('code').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') connect();
    });
  </script>
</body>
</html>
